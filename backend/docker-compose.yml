services:
  # LiteLLM Proxy Server (custom image with Presidio + PII hook)
  litellm-proxy:
    build: .
    container_name: litellm-proxy
    ports:
      - "8080:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - DATABASE_URL=postgresql://${PII_DB_USER:-pii_user}:${POSTGRES_PASSWORD}@${PII_DB_HOST:-pii-postgres-db}:${PII_DB_PORT:-5432}/${PII_DB_NAME:-pii_proxy_db}
      - REDIS_URL=redis://${PII_REDIS_HOST:-pii-redis-cache}:${PII_REDIS_PORT:-6379}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - PII_REROUTE_ENABLED=${PII_REROUTE_ENABLED:-true}
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./pii-events.jsonl:/app/pii-events.jsonl
    command: [--config, /app/config.yaml, --port, "8000"]
    restart: unless-stopped
    depends_on:
      pii-postgres:
        condition: service_healthy
        required: false
      pii-redis:
        condition: service_healthy
        required: false
    networks:
      - pii-proxy-network

  # PostgreSQL for audit logs and metadata (standalone mode only)
  pii-postgres:
    image: postgres:15-alpine
    container_name: pii-postgres-db
    profiles: ["standalone"]
    environment:
      POSTGRES_DB: ${PII_DB_NAME:-pii_proxy_db}
      POSTGRES_USER: ${PII_DB_USER:-pii_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pii-postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PII_DB_USER:-pii_user} -d ${PII_DB_NAME:-pii_proxy_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pii-proxy-network

  # Redis for caching (standalone mode only)
  pii-redis:
    image: redis:7-alpine
    container_name: pii-redis-cache
    profiles: ["standalone"]
    expose:
      - "6379"
    volumes:
      - pii-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pii-proxy-network

volumes:
  pii-postgres-data:
  pii-redis-data:

networks:
  pii-proxy-network:
    driver: bridge
