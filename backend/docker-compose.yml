version: '3.8'

services:
  # LiteLLM Proxy Server (custom image with Presidio + PII hook)
  litellm-proxy:
    build: .
    container_name: litellm-proxy
    ports:
      - "8080:8000"
    environment:
      # - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}  # disabled for UAT
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - DATABASE_URL=postgresql://pii_user:${POSTGRES_PASSWORD}@postgres-db:5432/pii_proxy_db
      - OLLAMA_API_BASE=${OLLAMA_API_BASE}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./pii-events.jsonl:/app/pii-events.jsonl
    command: [--config, /app/config.yaml, --port, "8000"]
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    networks:
      - pii-proxy-network

  # PostgreSQL for audit logs and metadata
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: pii_proxy_db
      POSTGRES_USER: pii_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - pii-proxy-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - pii-proxy-network

volumes:
  postgres-data:
  redis-data:

networks:
  pii-proxy-network:
    driver: bridge
